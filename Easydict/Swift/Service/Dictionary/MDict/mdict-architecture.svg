<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700" role="img" aria-labelledby="title desc">
  <title id="title">MDict 架构</title>
  <desc id="desc">展示 MDict 导入、加载、搜索 fallback、同名 CSS、资源缓存、data URI 预算和 HTML 渲染的主要组件与数据流。</desc>
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .title { fill: #111827; font-size: 24px; font-weight: 600; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .group-title { fill: #374151; font-size: 15px; font-weight: 600; }
    .box-title { fill: #111827; font-size: 15px; font-weight: 600; }
    .box-text { fill: #4b5563; font-size: 12px; }
    .label { fill: #6b7280; font-size: 12px; }
    .lane-title { fill: #374151; font-size: 13px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <rect width="960" height="700" fill="#ffffff"/>

  <text x="48" y="48" class="title">MDict 离线词典</text>
  <text x="48" y="72" class="subtitle">导入 MDX/MDD 文件，解析索引和记录块，并复用词典 HTML 渲染层展示结果。</text>

  <rect x="40" y="104" width="880" height="520" rx="10" ry="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="62" y="134" class="group-title">Easydict/Swift/Service/Dictionary/MDict</text>

  <rect x="66" y="164" width="828" height="142" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="88" y="191" class="lane-title">导入与加载</text>

  <rect x="92" y="216" width="174" height="64" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="179" y="241" text-anchor="middle" class="box-title">配置视图</text>
  <text x="179" y="263" text-anchor="middle" class="box-text">导入、启用、排序、删除</text>

  <rect x="356" y="204" width="184" height="88" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="448" y="235" text-anchor="middle" class="box-title">MDictManager</text>
  <text x="448" y="260" text-anchor="middle" class="box-text">Defaults records</text>
  <text x="448" y="280" text-anchor="middle" class="box-text">后台按需加载</text>

  <rect x="624" y="216" width="218" height="64" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="733" y="241" text-anchor="middle" class="box-title">MDictDictionary</text>
  <text x="733" y="263" text-anchor="middle" class="box-text">MDX reader + 懒加载 MDD</text>

  <path d="M266 248 H356" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="311" y="236" text-anchor="middle" class="label">MDX / MDD</text>
  <path d="M540 248 H624" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="582" y="236" text-anchor="middle" class="label">async load</text>

  <rect x="66" y="344" width="828" height="164" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="88" y="371" class="lane-title">查询与渲染</text>

  <rect x="92" y="402" width="174" height="72" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="179" y="431" text-anchor="middle" class="box-title">MDictService</text>
  <text x="179" y="454" text-anchor="middle" class="box-text">QueryService 入口</text>

  <rect x="356" y="390" width="184" height="96" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="448" y="421" text-anchor="middle" class="box-title">MDictDictionary</text>
  <text x="448" y="446" text-anchor="middle" class="box-text">精确查词与资源重写</text>
  <text x="448" y="466" text-anchor="middle" class="box-text">同名 CSS + data URI 预算</text>

  <rect x="624" y="390" width="218" height="96" rx="8" ry="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="733" y="421" text-anchor="middle" class="box-title">DictionaryHTMLRenderer</text>
  <text x="733" y="446" text-anchor="middle" class="box-text">组装 section 与 iframe</text>
  <text x="733" y="466" text-anchor="middle" class="box-text">输出结果面板 HTML</text>

  <path d="M266 438 H356" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <text x="311" y="426" text-anchor="middle" class="label">enabled dicts</text>
  <path d="M540 438 H624" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <text x="582" y="426" text-anchor="middle" class="label">HTML section</text>

  <rect x="290" y="538" width="380" height="70" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="480" y="567" text-anchor="middle" class="box-title">MDictReader/</text>
  <text x="480" y="590" text-anchor="middle" class="box-text">reader、parser、search index 与 binary helpers</text>

  <path d="M733 280 C733 330 480 330 480 390" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="608" y="324" text-anchor="middle" class="label">初始化 MDX reader</text>
  <path d="M448 486 V538" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="468" y="516" class="label">lookup</text>

  <g transform="translate(66, 650)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
    <text x="44" y="12" class="label">导入 / 加载</text>
    <line x1="154" y1="8" x2="186" y2="8" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
    <text x="198" y="12" class="label">查询 / 渲染</text>
    <line x1="322" y1="8" x2="354" y2="8" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
    <text x="366" y="12" class="label">二进制读取</text>
  </g>
</svg>
